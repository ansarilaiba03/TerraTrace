<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TerraTrace — Live Forest Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a1a0f;
      color: #e0f0e0;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0d2b14, #1a4a20);
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #2d6a35;
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    header h1 {
      font-size: 1.6rem;
      color: #5ddb7a;
      letter-spacing: 1px;
    }
    header h1 span { color: #a8e6b4; font-size: 1rem; font-weight: 400; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(93,219,122,0.1);
      border: 1px solid #5ddb7a;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #5ddb7a;
    }
    .live-dot {
      width: 10px; height: 10px;
      background: #5ddb7a;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 16px 30px;
      background: #0d1f12;
      border-bottom: 1px solid #1e3d24;
    }
    .stat-card {
      flex: 1;
      background: #122918;
      border: 1px solid #1e3d24;
      border-radius: 10px;
      padding: 14px 18px;
      text-align: center;
    }
    .stat-card .val {
      font-size: 2rem;
      font-weight: 700;
      color: #5ddb7a;
    }
    .stat-card .val.red { color: #ff5c5c; }
    .stat-card .label {
      font-size: 0.75rem;
      color: #7aab80;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      height: calc(100vh - 140px);
    }

    /* ── MAP ── */
    #map {
      width: 100%;
      height: 100%;
      background: #0d2010;
    }

    /* ── ALERT PANEL ── */
    .alert-panel {
      background: #0d1f12;
      border-left: 1px solid #1e3d24;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px;
      background: #122918;
      border-bottom: 1px solid #1e3d24;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-header h2 { font-size: 1rem; color: #a8e6b4; }
    .alert-count {
      background: #ff5c5c;
      color: white;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    #alert-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #alert-list::-webkit-scrollbar { width: 4px; }
    #alert-list::-webkit-scrollbar-track { background: #0d1f12; }
    #alert-list::-webkit-scrollbar-thumb { background: #2d6a35; border-radius: 4px; }

    /* ── ALERT CARD ── */
    .alert-card {
      background: #122918;
      border: 1px solid #1e3d24;
      border-radius: 10px;
      padding: 14px;
      animation: slideIn 0.4s ease;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .alert-card:hover { border-color: #5ddb7a; }
    .alert-card.threat {
      border-left: 4px solid #ff5c5c;
      background: #1a1212;
    }
    .alert-card.safe {
      border-left: 4px solid #5ddb7a;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .threat-type {
      font-size: 1rem;
      font-weight: 700;
      color: #ff5c5c;
    }
    .threat-type.safe-text { color: #5ddb7a; }
    .conf-badge {
      background: rgba(255,92,92,0.15);
      border: 1px solid #ff5c5c;
      color: #ff5c5c;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .card-zone {
      font-size: 0.85rem;
      color: #7aab80;
      margin-bottom: 6px;
    }
    .card-time {
      font-size: 0.75rem;
      color: #4a7a52;
    }
    .conf-bar-wrap {
      background: #0a1a0f;
      border-radius: 4px;
      height: 4px;
      margin-top: 10px;
      overflow: hidden;
    }
    .conf-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff5c5c, #ff9a5c);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #4a7a52;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ff5c5c;
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 4px 20px rgba(255,92,92,0.4);
      z-index: 9999;
      display: none;
      animation: toastIn 0.3s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- HEADER -->
<header>
  <h1>🌿 TerraTrace <span>— Live Forest Monitor</span></h1>
  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE
  </div>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="val red" id="stat-total">0</div>
    <div class="label">Total Alerts</div>
  </div>
  <div class="stat-card">
    <div class="val red" id="stat-chainsaw">0</div>
    <div class="label">Chainsaw</div>
  </div>
  <div class="stat-card">
    <div class="val red" id="stat-gunshot">0</div>
    <div class="label">Gunshot</div>
  </div>
  <div class="stat-card">
    <div class="val red" id="stat-vehicle">0</div>
    <div class="label">Vehicle</div>
  </div>
  <div class="stat-card">
    <div class="val" id="stat-zones">3</div>
    <div class="label">Zones Active</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- MAP -->
  <div id="map"></div>

  <!-- ALERT PANEL -->
  <div class="alert-panel">
    <div class="panel-header">
      <h2>📋 Live Alerts</h2>
      <span class="alert-count" id="alert-count">0</span>
    </div>
    <div id="alert-list">
      <div class="empty-state">
        <div class="icon">🌳</div>
        <p>Listening for threats...<br/>All zones are safe.</p>
      </div>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, limit }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ── Your Firebase config (already in your project) ──
  const firebaseConfig = {
    apiKey           : "AIzaSyB65rlinJrfEdTMMmfLaObtZXbnA-Ym-sM",
    authDomain       : "terratrace-ae480.firebaseapp.com",
    projectId        : "terratrace-ae480",
    storageBucket    : "terratrace-ae480.firebasestorage.app",
    messagingSenderId: "335148453845",
    appId            : "1:335148453845:web:cf21f7b60a0d160fef775c",
    measurementId    : "G-4NSPE2DVQ0"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── Zone definitions with fixed coordinates ──
  const ZONES = {
    "Zone A — North Entry" : { lat: 19.2147, lon: 72.9105, marker: null },
    "Zone B — Kanheri Path": { lat: 19.2203, lon: 72.9187, marker: null },
    "Zone C — Deer Park"   : { lat: 19.2089, lon: 72.9034, marker: null },
  };

  // ── Stats counters ──
  let stats = { total: 0, chainsaw: 0, gunshot: 0, vehicle: 0 };
  let isFirstLoad = true;

  // ── Toast notification ──
  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 4000);
  }

  // ── Format Firestore timestamp ──
  function formatTime(ts) {
    if (!ts) return "Just now";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  // ── Threat icon ──
  function threatIcon(type) {
    const t = (type || "").toLowerCase();
    if (t.includes("chainsaw")) return "🪚";
    if (t.includes("gunshot"))  return "🔫";
    if (t.includes("vehicle"))  return "🚛";
    if (t.includes("axe"))      return "🪓";
    return "⚠️";
  }

  // ── Update stat counters ──
  function updateStats(alerts) {
    stats = { total: alerts.length, chainsaw: 0, gunshot: 0, vehicle: 0 };
    alerts.forEach(a => {
      const t = (a.type || "").toLowerCase();
      if (t.includes("chainsaw")) stats.chainsaw++;
      if (t.includes("gunshot"))  stats.gunshot++;
      if (t.includes("vehicle"))  stats.vehicle++;
    });
    document.getElementById("stat-total").textContent    = stats.total;
    document.getElementById("stat-chainsaw").textContent = stats.chainsaw;
    document.getElementById("stat-gunshot").textContent  = stats.gunshot;
    document.getElementById("stat-vehicle").textContent  = stats.vehicle;
    document.getElementById("alert-count").textContent   = stats.total;
  }

  // ── Render alert cards ──
  function renderAlerts(alerts) {
    const list = document.getElementById("alert-list");

    if (alerts.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">🌳</div>
          <p>Listening for threats...<br/>All zones are safe.</p>
        </div>`;
      return;
    }

    list.innerHTML = "";
    alerts.forEach(alert => {
      const card = document.createElement("div");
      card.className = "alert-card threat";

      const conf = alert.confidence || 0;
      const icon = threatIcon(alert.type);

      card.innerHTML = `
        <div class="card-top">
          <span class="threat-type">${icon} ${alert.type || "Unknown"}</span>
          <span class="conf-badge">${conf}%</span>
        </div>
        <div class="card-zone">📍 ${alert.zone || "Unknown Zone"}</div>
        <div class="card-time">🕐 ${formatTime(alert.time)}</div>
        <div class="conf-bar-wrap">
          <div class="conf-bar" style="width:${conf}%"></div>
        </div>
      `;

      // Click → open Google Maps
      if (alert.lat && alert.lon) {
        card.onclick = () =>
          window.open(`https://maps.google.com/?q=${alert.lat},${alert.lon}`, "_blank");
        card.title = "Click to open location on Google Maps";
      }

      list.appendChild(card);
    });
  }

  // ── Update map markers ──
  function updateMapMarkers(alerts, map) {
    if (!map || !window.google) return;

    // Reset all zones to green
    Object.values(ZONES).forEach(z => {
      if (z.marker) {
        z.marker.setIcon({
          path: google.maps.SymbolPath.CIRCLE,
          scale: 12,
          fillColor: "#5ddb7a",
          fillOpacity: 0.9,
          strokeColor: "#2d6a35",
          strokeWeight: 2,
        });
      }
    });

    // Turn threat zones red
    alerts.forEach(alert => {
      const zone = ZONES[alert.zone];
      if (zone && zone.marker) {
        zone.marker.setIcon({
          path: google.maps.SymbolPath.CIRCLE,
          scale: 14,
          fillColor: "#ff5c5c",
          fillOpacity: 0.9,
          strokeColor: "#cc0000",
          strokeWeight: 2,
        });
      }
    });
  }

  // ── Init Google Map ──
  window.initMap = function () {
    const map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 19.2147, lng: 72.9105 },
      zoom: 14,
      mapTypeId: "satellite",
      styles: [{ featureType: "all", elementType: "labels.text.fill",
                 stylers: [{ color: "#a8e6b4" }] }]
    });

    // Place zone markers
    Object.entries(ZONES).forEach(([name, zone]) => {
      const marker = new google.maps.Marker({
        position : { lat: zone.lat, lng: zone.lon },
        map      : map,
        title    : name,
        icon     : {
          path         : google.maps.SymbolPath.CIRCLE,
          scale        : 12,
          fillColor    : "#5ddb7a",
          fillOpacity  : 0.9,
          strokeColor  : "#2d6a35",
          strokeWeight : 2,
        }
      });

      const infoWindow = new google.maps.InfoWindow({
        content: `<div style="color:#000;font-weight:bold">${name}</div>`
      });
      marker.addListener("click", () => infoWindow.open(map, marker));

      zone.marker = marker;
    });

    // ── Listen to Firestore in real-time ──
    const q = query(
      collection(db, "alerts"),
      orderBy("time", "desc"),
      limit(50)
    );

    let prevCount = 0;

    onSnapshot(q, (snapshot) => {
      const alerts = [];
      snapshot.forEach(doc => alerts.push(doc.data()));

      // Show toast for new alert (skip on first page load)
      if (!isFirstLoad && alerts.length > prevCount) {
        const newest = alerts[0];
        showToast(`🚨 ${newest.type} detected at ${newest.zone}!`);
      }
      isFirstLoad = false;
      prevCount   = alerts.length;

      renderAlerts(alerts);
      updateStats(alerts);
      updateMapMarkers(alerts, map);
    });
  };
</script>

<!-- Google Maps (no API key needed for basic use in localhost) -->
<script
  src="https://maps.googleapis.com/maps/api/js?callback=initMap"
  async defer>
</script>

</body>
</html>
